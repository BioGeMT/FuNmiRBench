# Downstream benchmark config.
# Consumes only the final upstream artifacts:
# - metadata/datasets.json
# - data/experiments/processed/*.tsv
# - metadata/predictions.json
# - data/predictions/<tool>/*_canonical.tsv

[paths]
root = "."
datasets_json = "metadata/datasets.json"
predictions_json = "metadata/predictions.json"
out_dir = "results/run_example"

[experiments]
dataset_ids = ["001"]

[predictors]
tool_ids = ["mock"]

[evaluation]
top_n = 100
fdr_threshold = 0.05
abs_logfc_threshold = 1.0
