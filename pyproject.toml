[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "funmirbench"
version = "0.0.0"
description = "Benchmarking framework for functional microRNA target prediction."
readme = "README.md"
requires-python = ">=3.10"
authors = [
  { name = "BioGeMT Project Team" }
]
dependencies = [
  "requests",
  "pandas",
]

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]
